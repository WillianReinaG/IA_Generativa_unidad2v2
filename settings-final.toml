order_example_customer_message = """
[Cliente] 2026-04-05 : Hola, mi número de seguimiento es ECO-2025-001923. ¿Sigue en camino o hay algún problema?
"""

order_reasoning = """
- ¿El número ECO-2025-001923 aparece en PEDIDOS_ECOMARKET? Sí.
- Estado registrado: Retraso logístico; notas mencionan clima en ruta y nueva ETA 2025-04-08.
- No debo inventar otra fecha ni cambiar el motivo.
"""

order_model_response_example = """
