ECO-2025-001940 | Mariana S. | 2025-04-03 | Procesando pago | Filtro de agua reemplazo 6 meses | Verificación bancaria en curso; máx. 24 h.

ECO-2025-001955 | Diego F. | 2025-03-29 | Cancelado | Kit jardín urbano | Cancelación solicitada por cliente antes del envío; reembolso en 5-7 días hábiles.

