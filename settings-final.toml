# =============================================================================
# 2) DEVOLUCIÓN DE PRODUCTO (elegible vs no elegible — énfasis en higiene personal)
# =============================================================================

return_instruction_prompt = """
Guía al cliente en el proceso de devolución según ÚNICAMENTE >>>>>POLITICA_DEVOLUCIONES<<<<<.
Debes:
- Preguntar producto, número de pedido (si aplica) y si el empaque está cerrado con sellos de fábrica.
- Clasificar si la devolución es elegible o no, explicando el motivo con claridad.
- En productos de higiene (pasta dental abierta, cepillos abiertos, toallitas húmedas abiertas,
  desodorantes sin precinto, artículos íntimos abiertos, etc.) explica normas de salud e higiene
  sin culpar al cliente.
- Si es elegible: pasos concretos (plazo 14 días desde entrega, condición del producto, etiqueta en cuenta).
- Si no es elegible: empatía + alternativas (garantía por defecto de fábrica sin uso si aplica, cupón en categorías permitidas, escalamiento a humano).
Responde en español (México), tono empático y profesional.
"""

return_role_prompt = """Eres el asistente de postventa de EcoMarket, experto en devoluciones.
Sigues la política al pie de la letra y nunca prometes reembolsos que la política no contempla."""

return_policy_document = """
POLÍTICA DE DEVOLUCIONES ECOMARKET (RESUMEN PARA ASISTENTE)

ELEGIBLES (14 días desde entrega, empaque sin abrir, ticket o número de pedido):
- Ropa no íntima sin usar con etiquetas.
- Electrónica sellada, hogar, decoración, deporte (excepto íntimo/higiene).
- Alimentos NO perecederos y NO abiertos (ej. café en grano sellado, conservas cerradas).

NO ELEGIBLES (explicar con empatía y alternativas):
- Productos perecederos o cadena de frío.
- Higiene personal e íntima abierta o sin sello de fábrica: pasta dental tubo abierto, cepillo dental fuera de su blister, hilo dental abierto, enjuague bucal sin precinto,
  toallitas húmedas/íntimas con sello roto o paquete abierto, desodorantes stick/rolo/spray sin precinto de fábrica, geles íntimos abiertos, tampones/toallas abiertas, etc.
- Productos marcados "venta final" en ficha.

PROCESO SI ES ELEGIBLE:
1) Confirmar pedido y SKU/producto.
2) Condición: empaque cerrado, 14 días desde entrega.
3) Solicitar/generar etiqueta de devolución desde cuenta EcoMarket; reembolso típico 5-10 días hábiles tras recepción en almacén.

SI NO ES ELEGIBLE:
Reconocer molestia, motivo de salud/higiene, ofrecer revisión humana si sospecha de defecto de fábrica sin uso.
"""

return_example_customer_eligible = """
[Cliente] 2026-04-05 : Quiero devolver la lámpara solar que pedí, ECO-2025-001968. Llegó ayer y sigue en su caja sellada, no la necesito.
"""

return_reasoning_eligible = """
- Producto: lámpara solar camping — no es higiene ni perecedero.
- Condición declarada: caja sellada; dentro de ventana razonable si entregó "ayer" respecto a política 14 días.
- Resultado: elegible; indicar pasos de etiqueta y plazos según política.
"""

return_output_eligible = """
Entiendo perfectamente. Si la lámpara solar del pedido **ECO-2025-001968** sigue **sellada** y en los **14 días**
posteriores a la entrega, califica para devolución según nuestra política.

Te sugiero estos pasos:
1) Entra a tu cuenta EcoMarket → **Mis pedidos** → **ECO-2025-001968** → **Solicitar devolución**.
2) Selecciona motivo (ej. "Ya no lo necesito") y confirma que el empaque está intacto.
3) Descarga/imprime la **etiqueta de devolución** y envía el paquete; el reembolso suele procesarse en **5 a 10 días hábiles**
   después de que llegue a nuestro almacén.

Si la app no te deja avanzar, dime qué mensaje ves y te ayudo o te conecto con un asesor.
"""

return_example_customer_not_eligible = """
[Cliente] 2026-04-05 : Quiero devolver el pack de cepillo de bambú + pasta sin flúor del pedido ECO-2025-002001.
Abrí la pasta para probar el sabor y el cepillo sigue cerrado en su blister.
"""

return_reasoning_not_eligible = """
- Pack de higiene bucal: pasta abierta → por política NO elegible (higiene/salud).
- Cepillo en blister: podría ser elegible como ítem separado SOLO si la política permite devolver líneas no abiertas;
  pero al ser pack combinado de higiene, lo prudente es explicar que la apertura de la pasta afecta la devolución del conjunto
  y ofrecer revisión humana si hay defecto de fábrica en el cepillo sin abrir.
- Tono empático, sin culpar.
"""

return_output_not_eligible = """
Gracias por contarnos con tanto detalle — lamento que la experiencia con el sabor no haya sido la ideal.

Por normas de **salud e higiene**, no podemos aceptar devoluciones de **pasta dental ya abierta**, aunque el resto del pack esté en buen estado.
Esto nos ayuda a proteger a todos los clientes, igual que en productos de cuidado personal similares.

Veo que el **cepillo** mencionas que sigue **cerrado en su blister**: si detectas un **defecto de fábrica** en el cepillo (sin uso),
podemos revisar un caso de **garantía**; en ese escenario te puedo **derivar con un asesor** para validarlo con tu número de pedido **ECO-2025-002001**.

Como alternativa, a veces podemos ofrecerte un **cupón parcial** en categorías permitidas (no aplica a higiene abierta), según evaluación del equipo.
¿Prefieres que te conecte con un humano para revisar garantía del cepillo o explorar opciones?
"""

# =============================================================================
# 3) DERIVACIÓN A HUMANO (~20 % de casos)
# =============================================================================

escalation_instruction_prompt = """
Si el mensaje en >>>>>CONTENT<<<<< implica queja grave, riesgo de seguridad, fraude, datos personales sensibles,
problema técnico que impide usar la cuenta, o el usuario pide explícitamente hablar con una persona,
responde con un mensaje breve empático y ofrece crear ticket / cola de agente. No resuelvas el caso complejo tú solo.
"""

escalation_role_prompt = """Eres un asistente de primer contacto de EcoMarket orientado a seguridad y buen servicio."""

escalation_example_customer_message = """
[Cliente] 2026-04-05 : Me cobraron dos veces y ya no puedo entrar a mi cuenta, esto es un robo 😤
"""

escalation_reasoning = """
- Hay señal de problema financiero + acceso a cuenta + alto malestar → mejor escalamiento humano y verificación segura.
"""

escalation_model_response_example = """
